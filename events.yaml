# =============================================================================
# OPTI TV ranking — event pool config
# =============================================================================
# This is the ONLY file you edit to manage the ranking's event pool.
# No code changes needed to add, remove, or adjust an event.
#
# How to fill in a Clubspot (USODA) event:
#   1. Open the event's results page in Firefox.
#   2. F12 -> Network tab -> reload -> filter XHR.
#   3. Find the call to results.theclubspot.com/clubspot-results-v4/{REGATTA_ID}?boatClassIDs={CLASS_ID}
#   4. Copy REGATTA_ID and CLASS_ID into the block below.
#      (CLASS_ID must be the Championship / Gold fleet — NOT Green or RWB.)
#
# How to fill in a Regatta Network event:
#   1. The results URL contains event/{EVENT_ID}  -> that's regatta_id.
#   2. platform: regatta_network ; no class_id needed (RN serves the fleet directly,
#      but set fleet_filter to the fleet name shown in the standings if multiple fleets exist).
#
# multiplier: 1.0 default. Trials 1.25, Nationals 1.15 (already set).
# usoda: true  -> NO size floor. POLICY (decided, not an oversight): USODA sanction
#                 IS the credibility credential, so USODA events count at any fleet size.
# usoda: false -> non-USODA event; scraper enforces the 150 Championship-Fleet floor
#                 and auto-drops if under. The floor exists ONLY to gate non-USODA events.
#
# stq_status: true -> Spring Teams Qualifier (rotating annual designation). When true,
#                 the qualifier multiplier (1.25) applies REGARDLESS of the multiplier
#                 field. Rotate by moving stq_status:true to next season's host event.
#                 Only ONE event should have stq_status:true per season.
# active: false -> event is ignored this run (use to stage events before results post).
#
# window anchor: the previous Team Trials date. Events dated >= anchor and <= today
# are scored. Set the anchor in run_config below.
# =============================================================================

run_config:
  window_anchor: "2025-06-01"   # previous Team Trials date; edit each season
